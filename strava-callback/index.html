<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SnapGPX - Connecting to Strava...</title>
    <style>
        body {
            font-family: -apple-system, system-ui, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: #f5f5f5;
            color: #333;
        }
        .container {
            text-align: center;
            padding: 2rem;
        }
        p { font-size: 1.1rem; }
    </style>
    <script>
        const params = new URLSearchParams(window.location.search);
        const code = params.get('code');
        const scope = params.get('scope');
        const error = params.get('error');

        if (code) {
            window.location.href = 'snapgpx://strava-callback?code=' + code + (scope ? '&scope=' + scope : '');
        } else if (error) {
            window.location.href = 'snapgpx://strava-callback?error=' + error;
        }
    </script>
</head>
<body>
    <div class="container">
        <p>Redirecting to SnapGPX...</p>
        <p><small>If the app doesn't open, please go back and try again.</small></p>
    </div>
</body>
</html>
